apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: sealed-secrets.live.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: sealed-secrets-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
spec:
  parentRefs:
    - name: sealed-secrets
  hostnames:
    - sealed-secrets.live.k8s.phl.io
  rules:
    # Only the public cert. The Ingress this replaced exposed exactly
    # /v1/cert.pem; the catch-all "/" written in phase 3 silently published the
    # rest of the controller's HTTP surface as well. Narrow it back.
    - matches:
        - path:
            type: Exact
            value: /v1/cert.pem
      backendRefs:
        - name: sealed-secrets
          port: 8080
