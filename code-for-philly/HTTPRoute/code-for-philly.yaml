apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: code-for-philly
  namespace: code-for-philly
spec:
  hostnames:
    - codeforphilly.org
    - www.codeforphilly.org
    - codeforphilly.live.k8s.phl.io
  parentRefs:
    - name: code-for-philly
  rules:
    - backendRefs:
        - name: code-for-philly-site
          port: 80
