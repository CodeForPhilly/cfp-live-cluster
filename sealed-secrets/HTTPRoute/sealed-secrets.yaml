apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
spec:
  hostnames:
    - sealed-secrets.live.k8s.phl.io
  parentRefs:
    - name: sealed-secrets
  rules:
    - backendRefs:
        - name: sealed-secrets
          port: 8080
      matches:
        - path:
            type: Exact
            value: /v1/cert.pem
