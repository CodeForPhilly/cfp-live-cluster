apiVersion: v1
data:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
    - name: cert-ops-email
      orgId: 1
      receivers:
      - settings:
          addresses: ${ALERT_EMAIL_TO}
          singleEmail: false
        type: email
        uid: cert-ops-email
  dashboardproviders.yaml: |
    apiVersion: 1
    providers:
    - disableDeletion: false
      editable: true
      folder: ""
      name: default
      options:
        path: /var/lib/grafana/dashboards/default
      orgId: 1
      type: file
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - isDefault: true
      name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://prometheus-server.prometheus.svc.cluster.local
    - access: proxy
      name: Loki
      type: loki
      uid: loki
      url: http://loki.loki.svc.cluster.local:3100
      version: 1
  download_dashboards.sh: |
    #!/usr/bin/env sh
    set -euf
    mkdir -p /var/lib/grafana/dashboards/default

    curl -skf \
    --connect-timeout 60 \
    --max-time 60 \
    -H "Accept: application/json" \
    -H "Content-Type: application/json;charset=UTF-8" \
      "https://grafana.com/api/dashboards/7249/revisions/1/download" \
      | sed '/-- .* --/! s/"datasource":.*,/"datasource": "Prometheus",/g' \
    > "/var/lib/grafana/dashboards/default/cluster-view.json"
      
    curl -skf \
    --connect-timeout 60 \
    --max-time 60 \
    -H "Accept: application/json" \
    -H "Content-Type: application/json;charset=UTF-8" \
      "https://grafana.com/api/dashboards/9614/revisions/1/download" \
      | sed '/-- .* --/! s/"datasource":.*,/"datasource": "Prometheus",/g' \
    > "/var/lib/grafana/dashboards/default/ingress-nginx.json"
      
    curl -skf \
    --connect-timeout 60 \
    --max-time 60 \
    -H "Accept: application/json" \
    -H "Content-Type: application/json;charset=UTF-8" \
      "https://grafana.com/api/dashboards/13736/revisions/1/download" \
      | sed '/-- .* --/! s/"datasource":.*,/"datasource": "Prometheus",/g' \
    > "/var/lib/grafana/dashboards/default/ingress-nginx-daemonset.json"
      
    curl -skf \
    --connect-timeout 60 \
    --max-time 60 \
    -H "Accept: application/json" \
    -H "Content-Type: application/json;charset=UTF-8" \
      "https://grafana.com/api/dashboards/1860/revisions/22/download" \
      | sed '/-- .* --/! s/"datasource":.*,/"datasource": "Prometheus",/g' \
    > "/var/lib/grafana/dashboards/default/node-exporter.json"
      
    curl -skf \
    --connect-timeout 60 \
    --max-time 60 \
    -H "Accept: application/json" \
    -H "Content-Type: application/json;charset=UTF-8" \
      "https://grafana.com/api/dashboards/8588/revisions/1/download" \
      | sed '/-- .* --/! s/"datasource":.*,/"datasource": "Prometheus",/g' \
    > "/var/lib/grafana/dashboards/default/workload-view.json"
  grafana.ini: |
    [analytics]
    check_for_updates = true
    [grafana_net]
    url = https://grafana.net
    [log]
    mode = console
    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning
    [server]
    domain = metrics.live.k8s.phl.io
    root_url = https://metrics.live.k8s.phl.io
    [smtp]
    enabled = true
    from_address = services@codeforphilly.org
    from_name = CFP Live Cluster
    host = smtp.postmarkapp.com:587
  policies.yaml: |
    apiVersion: 1
    policies:
    - group_by:
      - alertname
      - namespace
      - name
      group_interval: 5m
      group_wait: 30s
      orgId: 1
      receiver: cert-ops-email
      repeat_interval: 12h
  rules.yaml: |
    apiVersion: 1
    groups:
    - folder: Certificates
      interval: 5m
      name: cert-manager
      orgId: 1
      rules:
      - annotations:
          description: renewalTime is over a day in the past and renewal hasn't happened.
            The cert is probably still valid, so nothing looks broken yet — that's exactly
            how the July 2026 outage stayed invisible for 56 days. Check `kubectl get
            challenges -A` for a stuck challenge.
          summary: 'Certificate {{ $labels.namespace }}/{{ $labels.name }} is overdue
            for renewal'
        condition: C
        data:
        - datasourceUid: prometheus
          model:
            expr: time() - certmanager_certificate_renewal_timestamp_seconds
            instant: true
            refId: A
          refId: A
          relativeTimeRange:
            from: 600
            to: 0
        - datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 86400
                type: gt
            expression: A
            refId: C
            type: threshold
          refId: C
        execErrState: OK
        for: 1h
        labels:
          severity: warning
        noDataState: OK
        title: CertRenewalOverdue
        uid: cert-renewal-overdue
      - annotations:
          description: Challenge in flight for over an hour. Healthy ones resolve in seconds.
            If its Order is gone, the Challenge is a half-orphan that GC won't reap and
            must be deleted by name, or it starves every future renewal for this hostname.
          summary: 'ACME challenge stuck for {{ $labels.namespace }}/{{ $labels.name
            }}'
        condition: C
        data:
        - datasourceUid: prometheus
          model:
            expr: certmanager_certificate_challenge_status
            instant: true
            refId: A
          refId: A
          relativeTimeRange:
            from: 600
            to: 0
        - datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 0
                type: gt
            expression: A
            refId: C
            type: threshold
          refId: C
        execErrState: OK
        for: 1h
        labels:
          severity: warning
        noDataState: OK
        title: CertChallengeStuck
        uid: cert-challenge-stuck
      - annotations:
          description: Renewal starts at 30 days, so this has been failing for a week
            or more.
          summary: 'Certificate {{ $labels.namespace }}/{{ $labels.name }} expires
            within 21 days'
        condition: C
        data:
        - datasourceUid: prometheus
          model:
            expr: certmanager_certificate_expiration_timestamp_seconds - time()
            instant: true
            refId: A
          refId: A
          relativeTimeRange:
            from: 600
            to: 0
        - datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 1814400
                type: lt
            expression: A
            refId: C
            type: threshold
          refId: C
        execErrState: OK
        for: 1h
        labels:
          severity: warning
        noDataState: OK
        title: CertExpiringSoon
        uid: cert-expiring-soon
      - annotations:
          description: Under a week to expiry. Users will see browser warnings when this
            lapses.
          summary: 'Certificate {{ $labels.namespace }}/{{ $labels.name }} expires
            within 7 days'
        condition: C
        data:
        - datasourceUid: prometheus
          model:
            expr: certmanager_certificate_expiration_timestamp_seconds - time()
            instant: true
            refId: A
          refId: A
          relativeTimeRange:
            from: 600
            to: 0
        - datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 604800
                type: lt
            expression: A
            refId: C
            type: threshold
          refId: C
        execErrState: OK
        for: 10m
        labels:
          severity: critical
        noDataState: OK
        title: CertExpiringCritical
        uid: cert-expiring-critical
      - annotations:
          description: No certificate can be issued or renewed through this issuer.
          summary: 'ClusterIssuer {{ $labels.name }} is not Ready'
        condition: C
        data:
        - datasourceUid: prometheus
          model:
            expr: certmanager_clusterissuer_ready_status{condition="True"}
            instant: true
            refId: A
          refId: A
          relativeTimeRange:
            from: 600
            to: 0
        - datasourceUid: __expr__
          model:
            conditions:
            - evaluator:
                params:
                - 1
                type: lt
            expression: A
            refId: C
            type: threshold
          refId: C
        execErrState: OK
        for: 15m
        labels:
          severity: critical
        noDataState: OK
        title: ClusterIssuerNotReady
        uid: clusterissuer-not-ready
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: grafana
    app.kubernetes.io/version: 9.2.5
    helm.sh/chart: grafana-6.44.10
  name: grafana
  namespace: grafana
