apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: browserless-chrome
  namespace: browserless-chrome
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: browserless-chrome.live.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: browserless-chrome-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: browserless-chrome
  namespace: browserless-chrome
spec:
  parentRefs:
    - name: browserless-chrome
  hostnames:
    - browserless-chrome.live.k8s.phl.io
  rules:
    - backendRefs:
        - name: browserless-chrome
          port: 80
