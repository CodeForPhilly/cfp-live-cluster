apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: third-places
  namespace: third-places
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: third-places.live.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: third-places-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: third-places
  namespace: third-places
spec:
  parentRefs:
    - name: third-places
  hostnames:
    - third-places.live.k8s.phl.io
  rules:
    - backendRefs:
        - name: third-places
          port: 80
