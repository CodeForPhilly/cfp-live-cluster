apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: code-for-philly
  namespace: code-for-philly
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https-apex
      protocol: HTTPS
      port: 443
      hostname: codeforphilly.org
      tls:
        mode: Terminate
        certificateRefs:
          - name: codeforphilly-org-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-www
      protocol: HTTPS
      port: 443
      hostname: www.codeforphilly.org
      tls:
        mode: Terminate
        certificateRefs:
          - name: www-codeforphilly-org-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-subdomain
      protocol: HTTPS
      port: 443
      hostname: codeforphilly.live.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: codeforphilly-live-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: code-for-philly
  namespace: code-for-philly
spec:
  parentRefs:
    - name: code-for-philly
  hostnames:
    - codeforphilly.org
    - www.codeforphilly.org
    - codeforphilly.live.k8s.phl.io
  rules:
    - backendRefs:
        - name: code-for-philly-site
          port: 80
