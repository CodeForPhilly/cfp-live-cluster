apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: third-places
  namespace: third-places
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: third-places.live.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: third-places-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: third-places
  namespace: third-places
spec:
  parentRefs:
    - name: third-places
  hostnames:
    - third-places.live.k8s.phl.io
  rules:
    # Django serves the API and admin; everything else is the frontend SPA.
    # Gateway API matches the longest path prefix, so these win over "/" below
    # regardless of rule order. Mirrors the Ingress this replaced — without the
    # split, "/" lands on Django and the site 404s.
    - matches:
        - path:
            type: PathPrefix
            value: /api/
        - path:
            type: PathPrefix
            value: /admin/
        - path:
            type: PathPrefix
            value: /static/admin/
      backendRefs:
        - name: third-places
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: third-places-frontend
          port: 80
