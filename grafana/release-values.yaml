# These values as applied last as downstream overrides
# See https://github.com/grafana/helm-charts/blob/grafana-6.2.1/charts/grafana/values.yaml

# Routing is handled by Envoy Gateway — see _gateways/grafana.yaml.
ingress:
  enabled: false

grafana.ini:
  server:
    # The chart infers [server] domain from ingress.hosts[0]. With the Ingress
    # disabled that inference is gone, so set it directly — grafana uses it to
    # build absolute URLs (share links, alert notifications).
    domain: metrics.live.k8s.phl.io
    root_url: https://metrics.live.k8s.phl.io

# Certificate alerting (SMTP, Postmark, the 5 cert alert rules, the pinned
# Prometheus datasource UID) now comes from the blueprint — see cluster-template
# k8s-common/grafana/default-values.yaml, pulled in via civic-cloud v1.10.1.
# The only per-cluster piece is the grafana-smtp Secret (token, from-address,
# recipients, and from-name "CFP Live Cluster"), sealed in grafana.secrets/.
