apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: third-places
  namespace: third-places
spec:
  hostnames:
    - third-places.live.k8s.phl.io
  parentRefs:
    - name: third-places
  rules:
    - backendRefs:
        - name: third-places
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /api/
        - path:
            type: PathPrefix
            value: /admin/
        - path:
            type: PathPrefix
            value: /static/admin/
    - backendRefs:
        - name: third-places-frontend
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
