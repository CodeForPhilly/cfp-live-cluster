apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: vaultwarden
  namespace: vaultwarden
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https-vaultwarden
      protocol: HTTPS
      port: 443
      hostname: vaultwarden.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: vaultwarden-phl-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-bitwarden
      protocol: HTTPS
      port: 443
      hostname: bitwarden.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: bitwarden-phl-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  parentRefs:
    - name: vaultwarden
  hostnames:
    - vaultwarden.phl.io
    - bitwarden.phl.io
  rules:
    - backendRefs:
        - name: vaultwarden
          port: 80
