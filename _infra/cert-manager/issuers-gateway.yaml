apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging-gateway
spec:
  acme:
    email: services@codeforphilly.org
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-gateway
    solvers:
      # cert-manager 1.20 gatewayHTTPRoute solver. cert-manager creates a
      # short-lived HTTPRoute attached to main-gateway for each challenge,
      # routing /.well-known/acme-challenge/* on the cert's hostname to its
      # solver Pod. Parallel to the existing nginx-based issuers in
      # cert-manager.issuers.yaml (root) — those keep serving existing
      # Ingress-managed Certs until each app cuts over to its Gateway.
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: main-gateway
                namespace: envoy-gateway-system
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-gateway
spec:
  acme:
    email: services@codeforphilly.org
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-gateway
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: main-gateway
                namespace: envoy-gateway-system
