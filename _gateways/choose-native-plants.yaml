apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: choose-native-plants
  namespace: choose-native-plants
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-gateway
spec:
  gatewayClassName: eg
  listeners:
    - name: https-subdomain
      protocol: HTTPS
      port: 443
      hostname: choose-native-plants.live.k8s.phl.io
      tls:
        mode: Terminate
        certificateRefs:
          - name: choose-native-plants-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-apex
      protocol: HTTPS
      port: 443
      hostname: choosenativeplants.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: choosenativeplants-com-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-www
      protocol: HTTPS
      port: 443
      hostname: www.choosenativeplants.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: www-choosenativeplants-com-gw-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: choose-native-plants
  namespace: choose-native-plants
spec:
  parentRefs:
    - name: choose-native-plants
  hostnames:
    - choose-native-plants.live.k8s.phl.io
    - choosenativeplants.com
    - www.choosenativeplants.com
  rules:
    - backendRefs:
        - name: choose-native-plants
          port: 80
